<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Saving</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'DM Sans', sans-serif;
        background-color: #f4f1ec;
        color: #1a1a2e;
      }

      /* ── HEADER ── */
      header {
        background-color: #1a1a2e;
        padding: 14px 32px;
        display: flex;
        align-items: center;
        gap: 32px;
      }

      .brand {
        font-family: 'DM Serif Display', serif;
        color: #fff;
        font-size: 20px;
        text-decoration: none;
        margin-right: auto;
      }

      .hnav {
        display: flex;
        gap: 24px;
      }

      .hnav a {
        text-decoration: none;
        color: rgba(255, 255, 255, 0.5);
        font-size: 14px;
        font-weight: 500;
        transition: color 0.2s;
      }

      .hnav a:hover,
      .hnav a.active {
        color: #fff;
      }

      /* ── STATS SECTION ── */
      .stats {
        min-height: 100vh;
        background-color: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 32px;
      }

      .stats h1 {
        font-family: 'DM Serif Display', serif;
        color: #fff;
        font-size: 48px;
        letter-spacing: -0.02em;
      }

      /* ── COST SECTION ── */
      .cost {
        min-height: 100vh;
        background-color: #f4f1ec;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 24px;
      }

      .cost-card {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        border-radius: 16px;
        padding: 32px;
        width: 100%;
        max-width: 480px;
        animation: cardAppear 0.6s ease forwards;
      }

      @keyframes cardAppear {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .cost-title {
        font-family: 'DM Serif Display', serif;
        color: #fff;
        font-size: 26px;
        margin-bottom: 4px;
      }

      .cost-subtitle {
        color: rgba(255, 255, 255, 0.45);
        font-size: 13px;
        margin-bottom: 24px;
      }

      /* ── COST ROWS ── */
      .cost-rows {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .cost-row {
        background: rgba(255, 255, 255, 0.07);
        border-radius: 10px;
        padding: 14px 16px;
        animation: fadeUp 0.5s ease both;
      }

      .cost-row:nth-child(1) { animation-delay: 0.1s; }
      .cost-row:nth-child(2) { animation-delay: 0.2s; }
      .cost-row:nth-child(3) { animation-delay: 0.3s; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .cost-row-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .cost-icon {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }

      .icon-snacks     { background: rgba(239, 159, 39, 0.2); }
      .icon-transport  { background: rgba(55, 138, 221, 0.2); }
      .icon-lunch      { background: rgba(99, 153, 34, 0.2); }

      .cost-row-label {
        color: rgba(255, 255, 255, 0.85);
        font-size: 13px;
        font-weight: 500;
      }

      .cost-inputs {
        display: flex;
        gap: 8px;
      }

      .cost-input {
        flex: 1;
        background: rgba(255, 255, 255, 0.1);
        border: 0.5px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        padding: 8px 10px;
        color: #fff;
        font-size: 13px;
        font-family: 'DM Sans', sans-serif;
        outline: none;
        transition: border-color 0.2s;
      }

      .cost-input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      .cost-input:focus {
        border-color: rgba(255, 255, 255, 0.4);
      }

      .cost-input.amount {
        max-width: 110px;
        flex: none;
      }

      /* ── TOTALS ── */
      .totals-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 0.5px solid rgba(255, 255, 255, 0.12);
      }

      .total-card {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        padding: 12px 14px;
      }

      .total-card-label {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 4px;
      }

      .total-card-value {
        font-size: 20px;
        font-weight: 500;
        color: #fff;
      }

      .total-card-value.positive { color: #97C459; }
      .total-card-value.negative { color: #F09595; }

      /* ── ADD BUTTON ── */
      .add-btn {
        width: 100%;
        margin-top: 14px;
        background: rgba(255, 255, 255, 0.07);
        border: 0.5px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        padding: 11px;
        color: rgba(255, 255, 255, 0.6);
        font-size: 13px;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
      }

      .add-btn:hover {
        background: rgba(255, 255, 255, 0.13);
        color: #fff;
      }

      /* ── FOOTER ── */
      footer {
        padding: 60px 32px;
        background-color: #1a1a2e;
        text-align: center;
        color: rgba(255, 255, 255, 0.3);
        font-size: 13px;
      }
    </style>
  </head>
  <body>

    <header>
      <a href="index.html" class="brand">Saving</a>
      <nav class="hnav">
        <a href="index.html">Home</a>
        <a href="admin.html">Dashboard</a>
        <a href="#" class="active">Costs</a>
        <a href="#">Contact</a>
        <a href="login.html">Login</a>
      </nav>
    </header>

    <section class="stats">
      <h1>Statistics</h1>
    </section>

    <section class="cost">
      <div class="cost-card">

        <p class="cost-title">Daily costs</p>
        <p class="cost-subtitle">Track your spending for today</p>

        <div class="cost-rows">

          <div class="cost-row">
            <div class="cost-row-header">
              <div class="cost-icon icon-snacks">🍪</div>
              <span class="cost-row-label">Snacks</span>
            </div>
            <div class="cost-inputs">
              <input class="cost-input" type="text" placeholder="e.g. chips, coffee…" maxlength="100">
              <input class="cost-input amount" type="number" min="0" placeholder="₱ 0.00" oninput="calcTotal()">
            </div>
          </div>

          <div class="cost-row">
            <div class="cost-row-header">
              <div class="cost-icon icon-transport">🚌</div>
              <span class="cost-row-label">Transportation</span>
            </div>
            <div class="cost-inputs">
              <input class="cost-input" type="text" placeholder="e.g. jeep, taxi…" maxlength="100">
              <input class="cost-input amount" type="number" min="0" placeholder="₱ 0.00" oninput="calcTotal()">
            </div>
          </div>

          <div class="cost-row">
            <div class="cost-row-header">
              <div class="cost-icon icon-lunch">🍱</div>
              <span class="cost-row-label">Lunch</span>
            </div>
            <div class="cost-inputs">
              <input class="cost-input" type="text" placeholder="e.g. sinangag, pork…" maxlength="100">
              <input class="cost-input amount" type="number" min="0" placeholder="₱ 0.00" oninput="calcTotal()">
            </div>
          </div>

        </div>

        <div class="totals-grid">
          <div class="total-card">
            <div class="total-card-label">Total spent</div>
            <div class="total-card-value" id="total-display">₱ 0.00</div>
          </div>
          <div class="total-card">
            <div class="total-card-label">vs. yesterday</div>
            <div class="total-card-value" id="vs-display">—</div>
          </div>
        </div>

        <button class="add-btn">+ Add another category</button>

      </div>
    </section>

    <footer>© 2026 Saving. All rights reserved.</footer>

    <script src="costs.js"></script>

  </body>
</html>
