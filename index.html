<!DOCTYPE html> 
 <html lang="en">
    <head>
        <title> Saving</title>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        
        <header>
            <a href="index.html" class="brand">Saving</a>
            <nav class="hnav">
                <a href="index.html">Home</a>
                <a href="admin.html">Dashboard</a>
                <a href="#" class="active">Costs</a>
                <a href="#">Contact</a>
                <a href="login.html">Login</a>
            </nav>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </header>

        <section class="stats">
            <h1>Statistics</h1>
            <p>Use javascript to display your spending statistics</p>
        </section>

       <section class="cost">
            <div class="cost-card">

                <p class="cost-title">Daily costs</p>
                <p class="cost-subtitle">Track your spending for today</p>

                <div class="cost-rows">

                <div class="cost-row">
                    <div class="cost-row-header">
                        <div class="cost-icon icon-snacks">🍪</div>
                        <span class="cost-row-label">Snacks</span>
                    </div>
                    <div class="cost-inputs">
                        <input class="cost-input" type="text" placeholder="e.g. chips, coffee…" maxlength="100">
                        <input class="cost-input amount" type="number" min="0" placeholder="₱ 0.00" oninput="calcTotal()">
                    </div>
                </div>

                <div class="cost-row">
                    <div class="cost-row-header">
                        <div class="cost-icon icon-transport">🚌</div>
                        <span class="cost-row-label">Transportation</span>
                    </div>
                    <div class="cost-inputs">
                        <input class="cost-input" type="text" placeholder="e.g. jeep, taxi…" maxlength="100">
                        <input class="cost-input amount" type="number" min="0" placeholder="₱ 0.00" oninput="calcTotal()">
                    </div>
                </div>

                <div class="cost-row">
                    <div class="cost-row-header">
                        <div class="cost-icon icon-lunch">🍱</div>
                        <span class="cost-row-label">Lunch</span>
                    </div>
                    <div class="cost-inputs">
                        <input class="cost-input" type="text" placeholder="e.g. sinangag, pork…" maxlength="100">
                        <input class="cost-input amount" type="number" min="0" placeholder="₱ 0.00" oninput="calcTotal()">
                    </div>
                </div>

                </div>

                <div class="totals-grid">
                    <div class="total-card">
                        <div class="total-card-label">Total spent</div>
                        <div class="total-card-value" id="total-display">₱ 0.00</div>
                    </div>
                    <div class="total-card">
                        <div class="total-card-label">vs. yesterday</div>
                        <div class="total-card-value" id="vs-display">—</div>
                    </div>
                </div>

                <button class="add-btn">+ Add another category</button>
            </div>
        </section>
        <footer>© 2026 Saving. All rights reserved.</footer>
        <script src="costs.js"></script>
    </body>
 </html>
